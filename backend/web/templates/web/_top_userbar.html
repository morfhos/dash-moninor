<div class="top-userbar">
  <div class="top-userbar-left">

  </div>

  <div class="top-userbar-right">
    <!-- Pesquisar campanhas -->
    <button class="icon-btn" type="button" aria-label="Pesquisar" title="Pesquisar campanhas" onclick="openSearchModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    </button>
    <!-- Analytics -->
    <a class="icon-btn" href="{% url 'web:analytics' %}" aria-label="Analytics" title="Analytics">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
    </a>
    <!-- Timeline Campanhas -->
    <a class="icon-btn" href="{% url 'web:timeline_campanhas' %}" aria-label="Timeline" title="Timeline Campanhas">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    </a>
    <!-- IA (admin only) -->
    {% if is_true_admin %}
    <a class="icon-btn" href="{% url 'web:configuracoes' %}?tab=ia" aria-label="IA" title="Inteligência Artificial">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a2 2 0 012 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 017 7h1.27c.34-.6.99-1 1.73-1a2 2 0 010 4c-.74 0-1.39-.4-1.73-1H20a7 7 0 01-7 7v1.27c.6.34 1 .99 1 1.73a2 2 0 01-4 0c0-.74.4-1.39 1-1.73V23a7 7 0 01-7-7H2.73c-.34.6-.99 1-1.73 1a2 2 0 010-4c.74 0 1.39.4 1.73 1H4a7 7 0 017-7V5.73c-.6-.34-1-.99-1-1.73a2 2 0 012-2z"/></svg>
    </a>
    {% endif %}
    <!-- Alertas (sino) -->
    <button class="icon-btn notification-btn {% if alertas_nao_lidos > 0 %}has-notifications{% endif %}" type="button" aria-label="Notificações" title="Alertas" onclick="openAlertasModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
      {% if alertas_nao_lidos > 0 %}
        <span class="notification-badge">{{ alertas_nao_lidos }}</span>
      {% endif %}
    </button>

    <div class="divider-vertical"></div>

    {% if impersonating_cliente %}
      <div style="display:flex; align-items:center; gap:10px; padding: 8px 10px; border: 1px solid var(--border-color); background: #ffffff; border-radius: 12px;">
        <div style="font-size: 11px; font-weight: 900; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.6px;">Visão cliente</div>
        <div style="font-size: 13px; font-weight: 900; color: var(--text-primary);">{{ impersonating_cliente.nome }}</div>
      </div>
    {% endif %}

    <div class="profile-wrap" data-profile-wrap>
      <button class="profile-btn" type="button" data-profile-toggle>
        <span class="avatar">
          {% with name=request.user.get_full_name|default:request.user.username %}
            <span class="avatar-fallback">{{ name|slice:":2"|upper }}</span>
          {% endwith %}
        </span>
        <span class="profile-name">
          {% if request.user.get_full_name %}{{ request.user.get_full_name }}{% else %}{{ request.user.username }}{% endif %}
        </span>
        <span class="profile-caret">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </span>
      </button>

      <div class="profile-menu" data-profile-menu hidden>
        <button class="profile-menu-item" type="button" data-action="logout">
          <span class="menu-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          </span>
          Logout
        </button>
      </div>
    </div>
  </div>
</div>
